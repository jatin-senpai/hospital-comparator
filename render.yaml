services:
  - type: web
    name: mediq-api
    env: docker
    region: singapore
    plan: free
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediq-db
          property: connectionString
      - key: PORT
        value: "8080"
  
databases:
  - name: mediq-db
    plan: free
    region: singapore
    postgresMajorVersion: 15
